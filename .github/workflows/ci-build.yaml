name: CI Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    uses: openimis/openimis-fe_js/.github/workflows/module-ci-build.yml@develop  # Adjust the path and branch as needed
    secrets:
      inherit
    with:
      branchName: ${{ github.head_ref || github.ref_name }}